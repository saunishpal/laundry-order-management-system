<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price List | LaundryPro</title>

</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<nav class="navbar">
  <div class="logo">Laundry<span>Pro</span></div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/create-order">Create Order</a>
    <a href="/orders-page">Orders</a>
    <a href="/dashboard-page">Dashboard</a>
    <a href="/price-list-page" class="active">Price List</a>

<main class="page-container">

  <section class="price-grid">

      <span>🥻</span>

      <p>₹120</p>
    </div>

    <div class="price-card">
      <span>👘</span>
      <h3>Kurta</h3>
      <p>₹80</p>
    </div>

    <div class="price-card">
      <span>🧥</span>
      <h3>Coat</h3>
      <p>₹200</p>
    </div>

    <div class="price-card">
      <span>🛏️</span>
      <h3>Bedsheet</h3>
      <p>₹150</p>
